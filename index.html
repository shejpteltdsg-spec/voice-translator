<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#4f46e5" />
<title>실시간 통역기 · Voice Translator</title>

<!-- 폰에 앱처럼 설치(저장)하기 위한 설정 -->
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="통역기" />
<meta name="mobile-web-app-capable" content="yes" />

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    background: linear-gradient(170deg, #4f46e5 0%, #7c3aed 100%);
    color: #1e293b;
    display: flex; flex-direction: column;
    height: 100dvh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  header { color: #fff; padding: 12px 16px 8px; text-align: center; }
  header h1 { margin: 0; font-size: 19px; font-weight: 800; letter-spacing: .3px; }
  header p { margin: 2px 0 0; font-size: 11.5px; opacity: .85; }

  /* ===== 언어 선택 (내 언어 / 상대 언어) ===== */
  .pickers { display: flex; align-items: center; gap: 8px; padding: 8px 12px 12px; }
  .picker { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .picker label { font-size: 11px; color: #e0e7ff; font-weight: 700; padding-left: 4px; }
  select {
    font-family: inherit; font-size: 15px; font-weight: 700;
    border: none; border-radius: 12px; padding: 10px 8px;
    background: #fff; color: #4f46e5; width: 100%;
    appearance: none; text-align: center; cursor: pointer;
  }
  .swap {
    margin-top: 18px; flex: 0 0 auto;
    width: 40px; height: 40px; border-radius: 50%;
    border: none; background: rgba(255,255,255,.2); color: #fff;
    font-size: 20px; cursor: pointer;
  }
  .swap:active { transform: scale(.9); }

  /* ===== 대화 로그 ===== */
  .log {
    flex: 1; overflow-y: auto; padding: 14px;
    background: #f1f5f9; border-radius: 22px 22px 0 0;
    display: flex; flex-direction: column; gap: 12px;
    -webkit-user-select: text; user-select: text;
  }
  .empty { margin: auto; text-align: center; color: #94a3b8; font-size: 15px; line-height: 1.7; }
  .empty .big { font-size: 40px; }
  .bubble { max-width: 82%; padding: 10px 14px; border-radius: 18px; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .bubble .who { font-size: 11px; font-weight: 700; opacity: .7; margin-bottom: 2px; }
  .bubble .orig { font-size: 15px; opacity: .65; }
  .bubble .trans { font-size: 21px; font-weight: 700; margin-top: 3px; }
  .bubble .replay { font-size: 12px; opacity: .6; margin-top: 5px; cursor: pointer; display: inline-block; }
  .me   { align-self: flex-end;   background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
  .them { align-self: flex-start; background: #fff;   color: #1e293b; border-bottom-left-radius: 4px; }

  .status { text-align: center; font-size: 14px; color: #fff; padding: 6px; min-height: 26px; background: rgba(0,0,0,.12); }

  /* ===== 마이크 버튼 ===== */
  .mics { display: flex; gap: 10px; padding: 12px 14px calc(14px + env(safe-area-inset-bottom)); background: #f1f5f9; }
  .mic {
    flex: 1; font-family: inherit; border: none; border-radius: 18px;
    padding: 15px 6px; cursor: pointer; color: #fff;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    box-shadow: 0 4px 0 rgba(0,0,0,.18); transition: transform .08s, box-shadow .08s;
  }
  .mic:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.18); }
  .mic .icon { font-size: 26px; }
  .mic .label { font-size: 15px; font-weight: 800; }
  .mic .sub { font-size: 11px; opacity: .9; }
  .mic.them { background: #0ea5e9; }
  .mic.me   { background: #4f46e5; }
  .mic.listening { animation: pulse .9s infinite; }
  @keyframes pulse { 0%,100%{ box-shadow:0 4px 0 rgba(0,0,0,.18), 0 0 0 0 rgba(255,255,255,.55);} 50%{ box-shadow:0 4px 0 rgba(0,0,0,.18), 0 0 0 13px rgba(255,255,255,0);} }
  .mic:disabled { opacity: .5; }

  /* ===== 자동(핸즈프리) 통역 버튼 ===== */
  .autowrap { background: #f1f5f9; padding: 12px 14px 0; }
  .auto {
    width: 100%; font-family: inherit; font-size: 17px; font-weight: 800;
    border: none; border-radius: 16px; padding: 15px; color: #fff;
    background: #22c55e; box-shadow: 0 4px 0 rgba(0,0,0,.18); cursor: pointer;
  }
  .auto:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.18); }
  .auto.on { background: #ef4444; animation: pulse .9s infinite; }
  .auto:disabled { opacity: .5; }

  /* ===== 목소리 설정 ===== */
  .voicebar { padding: 0 14px 10px; }
  .voicetoggle { width: 100%; font-family: inherit; font-size: 13px; font-weight: 700; color: #4f46e5; background: #fff; border: none; border-radius: 12px; padding: 9px; cursor: pointer; box-shadow: 0 2px 4px rgba(0,0,0,.12); }
  .voicepanel { display: none; background: #fff; border-radius: 14px; margin-top: 8px; padding: 6px 12px; box-shadow: 0 4px 10px rgba(0,0,0,.15); max-height: 42vh; overflow-y: auto; }
  .voicepanel.open { display: block; }
  .vrow { padding: 9px 0; border-bottom: 1px solid #eef2f7; }
  .vrow:last-child { border-bottom: none; }
  .vtitle { font-size: 13px; font-weight: 800; color: #334155; margin-bottom: 7px; }
  .vctrl { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .vgender { display: flex; gap: 6px; }
  .vgender button { font-family: inherit; font-size: 13px; font-weight: 700; border: 2px solid #e2e8f0; background: #fff; color: #475569; border-radius: 999px; padding: 6px 10px; cursor: pointer; }
  .vgender button.sel { border-color: #4f46e5; background: #eef2ff; color: #4f46e5; }
  .vsel { flex: 1 1 130px; min-width: 110px; font-family: inherit; font-size: 13px; font-weight: 600; border: 2px solid #e2e8f0; border-radius: 10px; padding: 8px; background: #fff; color: #334155; }
  .vplay { font-family: inherit; font-size: 13px; font-weight: 700; border: none; background: #0ea5e9; color: #fff; border-radius: 10px; padding: 8px 12px; cursor: pointer; }
  .vnone { font-size: 12px; color: #94a3b8; line-height: 1.5; }

  /* ===== 통역 통화 (앱 안 인터넷 통화) ===== */
  .callbar { padding: 0 14px 10px; }
  .calltoggle { width: 100%; font-family: inherit; font-size: 13px; font-weight: 700; color: #0ea5e9; background: #fff; border: none; border-radius: 12px; padding: 9px; cursor: pointer; box-shadow: 0 2px 4px rgba(0,0,0,.12); }
  .callpanel { display: none; background: #fff; border-radius: 14px; margin-top: 8px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,.15); }
  .callpanel.open { display: block; }
  .callrow { display: flex; gap: 8px; }
  .cbtn { flex: 1; font-family: inherit; font-size: 14px; font-weight: 800; border: none; border-radius: 12px; padding: 11px 8px; cursor: pointer; background: #0ea5e9; color: #fff; }
  .cbtn.join { background: #6366f1; }
  .cbtn.call { width: 100%; margin-top: 8px; background: #22c55e; font-size: 16px; }
  .cbtn.call.on { background: #ef4444; }
  .cbtn.hang { width: 100%; margin-top: 8px; background: #94a3b8; }
  .ccode { font-size: 34px; font-weight: 900; letter-spacing: 6px; text-align: center; color: #0ea5e9; padding: 12px; background: #f0f9ff; border-radius: 12px; margin-top: 10px; }
  .cinput { width: 100%; font-family: inherit; font-size: 22px; font-weight: 800; text-align: center; letter-spacing: 5px; text-transform: uppercase; border: 2px solid #e2e8f0; border-radius: 12px; padding: 10px; margin-top: 10px; }
  .cnote { font-size: 12px; color: #64748b; text-align: center; margin-top: 8px; line-height: 1.5; }
  .clive { font-size: 15px; font-weight: 800; text-align: center; color: #0f766e; }
  .ccopy { font-family: inherit; font-size: 12px; font-weight: 700; border: none; background: #e0f2fe; color: #0369a1; border-radius: 999px; padding: 6px 14px; margin: 8px auto 0; cursor: pointer; display: block; }

  /* ===== 채팅 입력줄 (연결되면 표시) ===== */
  .chatbar { display: none; gap: 8px; padding: 10px 14px 0; background: #f1f5f9; }
  .chatbar.show { display: flex; }
  .chatinput { flex: 1; min-width: 0; font-family: inherit; font-size: 16px; border: 2px solid #e2e8f0; border-radius: 14px; padding: 11px 14px; background: #fff; }
  .chatsend { font-family: inherit; font-size: 15px; font-weight: 800; border: none; border-radius: 14px; padding: 11px 16px; background: #22c55e; color: #fff; cursor: pointer; }

  /* ===== 설치 안내 배너 ===== */
  .install { display: none; background: #fef9c3; color: #713f12; font-size: 13px; padding: 8px 12px; text-align: center; }
  .install button { font-family: inherit; margin-left: 8px; border: none; background: #f59e0b; color: #fff; font-weight: 700; padding: 5px 12px; border-radius: 999px; cursor: pointer; }
</style>
</head>
<body>
  <header>
    <h1>🗣️ 실시간 통역기</h1>
    <p>말하면 상대 언어로 통역해서 소리 내어 읽어줘요 · 스피커폰 통화 옆에 켜두세요</p>
  </header>

  <div class="pickers">
    <div class="picker">
      <label>🙋 내 언어</label>
      <select id="myLang"></select>
    </div>
    <button class="swap" id="swap" title="언어 바꾸기">⇄</button>
    <div class="picker">
      <label>🗣️ 상대 언어</label>
      <select id="theirLang"></select>
    </div>
  </div>

  <div class="voicebar">
    <button class="voicetoggle" id="voiceToggle">🔊 목소리 설정 (남 / 여 · 여러 목소리) ▾</button>
    <div class="voicepanel" id="voicePanel"></div>
  </div>

  <div class="callbar">
    <button class="calltoggle" id="callToggle">📞 멀리 있는 사람과 통역 통화 (둘 다 앱 필요) ▾</button>
    <div class="callpanel" id="callPanel">
      <div id="callSetup">
        <div class="callrow">
          <button class="cbtn host" id="hostBtn">🆕 방 만들기</button>
          <button class="cbtn join" id="joinBtn">🔑 코드로 참여</button>
        </div>
        <div id="hostArea" style="display:none">
          <div class="ccode" id="roomCode">…</div>
          <button class="ccopy" id="copyCode">📋 코드 복사</button>
          <div class="cnote">이 코드를 상대에게 알려주세요.<br>상대가 참여하면 자동으로 연결돼요.</div>
        </div>
        <div id="joinArea" style="display:none">
          <input id="codeInput" class="cinput" placeholder="코드" maxlength="5" autocapitalize="characters" autocomplete="off" />
          <button class="cbtn" id="connectBtn" style="width:100%;margin-top:8px">연결하기</button>
        </div>
        <div class="cnote" id="callStatus"></div>
      </div>
      <div id="callLive" style="display:none">
        <div class="clive">🟢 연결됨 · 상대 언어: <span id="peerLangLabel">?</span></div>
        <button class="cbtn call" id="callBtn">📞 통역 통화 시작</button>
        <button class="cbtn hang" id="hangBtn">연결 끊기</button>
        <div class="cnote">🎧 <b>이어폰</b>을 쓰면 소리 겹침 없이 깔끔해요.<br>내가 말하면 상대는 자기 언어로, 상대 말은 내가 내 언어로 들어요.</div>
      </div>
    </div>
  </div>

  <div class="install" id="install">
    📲 이 앱을 폰에 저장할 수 있어요
    <button id="installBtn">설치</button>
  </div>

  <div class="log" id="log">
    <div class="empty" id="empty">
      <div class="big">🎧</div>
      <b>자동 통역 시작</b>을 누르고<br>
      번갈아 말하면 알아서 통역해요.<br>
      <span style="font-size:13px">(스피커폰 통화 옆에 켜두세요)</span>
    </div>
  </div>

  <div class="status" id="status">준비됐어요</div>

  <div class="chatbar" id="chatBar">
    <input id="chatInput" class="chatinput" placeholder="메시지 입력…" autocomplete="off" />
    <button id="chatSend" class="chatsend">보내기</button>
  </div>

  <div class="autowrap">
    <button class="auto" id="autoBtn">🎧 자동 통역 시작 (핸즈프리)</button>
  </div>

  <div class="mics">
    <button class="mic them" id="micThem">
      <span class="icon">🎤</span>
      <span class="label" id="themLabel">상대</span>
      <span class="sub">상대가 말해요</span>
    </button>
    <button class="mic me" id="micMe">
      <span class="icon">🎤</span>
      <span class="label" id="meLabel">나</span>
      <span class="sub">내가 말해요</span>
    </button>
  </div>

<script>
/* =========================================================
   전 세계 언어 목록
   stt: 음성인식 코드 / tts: 읽어주기 코드 / mm: 무료 번역 API 코드
========================================================= */
const LANGS = [
  { code:"ko",    name:"한국어",      flag:"🇰🇷", stt:"ko-KR", tts:"ko-KR", mm:"ko",    hello:"안녕하세요, 반갑습니다" },
  { code:"en",    name:"English",     flag:"🇺🇸", stt:"en-US", tts:"en-US", mm:"en",    hello:"Hello, nice to meet you" },
  { code:"ja",    name:"日本語",      flag:"🇯🇵", stt:"ja-JP", tts:"ja-JP", mm:"ja",    hello:"こんにちは、はじめまして" },
  { code:"zh",    name:"中文(简体)",  flag:"🇨🇳", stt:"zh-CN", tts:"zh-CN", mm:"zh-CN", hello:"你好，很高兴认识你" },
  { code:"zh-TW", name:"中文(繁體)",  flag:"🇹🇼", stt:"zh-TW", tts:"zh-TW", mm:"zh-TW", hello:"你好，很高興認識你" },
  { code:"fr",    name:"Français",    flag:"🇫🇷", stt:"fr-FR", tts:"fr-FR", mm:"fr",    hello:"Bonjour, enchanté" },
  { code:"de",    name:"Deutsch",     flag:"🇩🇪", stt:"de-DE", tts:"de-DE", mm:"de",    hello:"Hallo, freut mich" },
  { code:"es",    name:"Español",     flag:"🇪🇸", stt:"es-ES", tts:"es-ES", mm:"es",    hello:"Hola, encantado" },
  { code:"it",    name:"Italiano",    flag:"🇮🇹", stt:"it-IT", tts:"it-IT", mm:"it",    hello:"Ciao, piacere" },
  { code:"pt",    name:"Português",   flag:"🇧🇷", stt:"pt-BR", tts:"pt-BR", mm:"pt-BR", hello:"Olá, prazer" },
  { code:"ru",    name:"Русский",     flag:"🇷🇺", stt:"ru-RU", tts:"ru-RU", mm:"ru",    hello:"Здравствуйте" },
  { code:"ar",    name:"العربية",     flag:"🇸🇦", stt:"ar-SA", tts:"ar-SA", mm:"ar",    hello:"مرحبا، تشرفنا" },
  { code:"hi",    name:"हिन्दी",       flag:"🇮🇳", stt:"hi-IN", tts:"hi-IN", mm:"hi",    hello:"नमस्ते" },
  { code:"th",    name:"ไทย",         flag:"🇹🇭", stt:"th-TH", tts:"th-TH", mm:"th",    hello:"สวัสดีครับ" },
  { code:"vi",    name:"Tiếng Việt",  flag:"🇻🇳", stt:"vi-VN", tts:"vi-VN", mm:"vi",    hello:"Xin chào" },
  { code:"id",    name:"Indonesia",   flag:"🇮🇩", stt:"id-ID", tts:"id-ID", mm:"id",    hello:"Halo, apa kabar" },
  { code:"nl",    name:"Nederlands",  flag:"🇳🇱", stt:"nl-NL", tts:"nl-NL", mm:"nl",    hello:"Hallo, aangenaam" },
  { code:"tr",    name:"Türkçe",      flag:"🇹🇷", stt:"tr-TR", tts:"tr-TR", mm:"tr",    hello:"Merhaba" },
  { code:"pl",    name:"Polski",      flag:"🇵🇱", stt:"pl-PL", tts:"pl-PL", mm:"pl",    hello:"Cześć" },
  { code:"sv",    name:"Svenska",     flag:"🇸🇪", stt:"sv-SE", tts:"sv-SE", mm:"sv",    hello:"Hej" },
  { code:"uk",    name:"Українська",  flag:"🇺🇦", stt:"uk-UA", tts:"uk-UA", mm:"uk",    hello:"Привіт" },
  { code:"el",    name:"Ελληνικά",    flag:"🇬🇷", stt:"el-GR", tts:"el-GR", mm:"el",    hello:"Γεια σας" },
  { code:"cs",    name:"Čeština",     flag:"🇨🇿", stt:"cs-CZ", tts:"cs-CZ", mm:"cs",    hello:"Ahoj" },
  { code:"ro",    name:"Română",      flag:"🇷🇴", stt:"ro-RO", tts:"ro-RO", mm:"ro",    hello:"Bună ziua" },
  { code:"hu",    name:"Magyar",      flag:"🇭🇺", stt:"hu-HU", tts:"hu-HU", mm:"hu",    hello:"Szia" },
  { code:"fi",    name:"Suomi",       flag:"🇫🇮", stt:"fi-FI", tts:"fi-FI", mm:"fi",    hello:"Hei" },
  { code:"da",    name:"Dansk",       flag:"🇩🇰", stt:"da-DK", tts:"da-DK", mm:"da",    hello:"Hej" },
  { code:"no",    name:"Norsk",       flag:"🇳🇴", stt:"nb-NO", tts:"nb-NO", mm:"no",    hello:"Hei" },
  { code:"he",    name:"עברית",       flag:"🇮🇱", stt:"he-IL", tts:"he-IL", mm:"he",    hello:"שלום" },
  { code:"fa",    name:"فارسی",       flag:"🇮🇷", stt:"fa-IR", tts:"fa-IR", mm:"fa",    hello:"سلام" },
  { code:"ms",    name:"Melayu",      flag:"🇲🇾", stt:"ms-MY", tts:"ms-MY", mm:"ms",    hello:"Halo, apa khabar" },
  { code:"fil",   name:"Filipino",    flag:"🇵🇭", stt:"fil-PH", tts:"fil-PH", mm:"tl",   hello:"Kumusta" },
];
const L = Object.fromEntries(LANGS.map(l => [l.code, l]));

/* ===== 드롭다운 채우기 ===== */
const myLangEl = document.getElementById("myLang");
const theirLangEl = document.getElementById("theirLang");
LANGS.forEach(l => {
  myLangEl.appendChild(new Option(`${l.flag} ${l.name}`, l.code));
  theirLangEl.appendChild(new Option(`${l.flag} ${l.name}`, l.code));
});
myLangEl.value = "ko";
theirLangEl.value = "en";

const meLabel = document.getElementById("meLabel");
const themLabel = document.getElementById("themLabel");
function refreshLabels() {
  meLabel.textContent = L[myLangEl.value].flag + " " + L[myLangEl.value].name;
  themLabel.textContent = L[theirLangEl.value].flag + " " + L[theirLangEl.value].name;
}
myLangEl.onchange = theirLangEl.onchange = () => { refreshLabels(); buildVoicePanel(); };
document.getElementById("swap").onclick = () => {
  const a = myLangEl.value; myLangEl.value = theirLangEl.value; theirLangEl.value = a;
  refreshLabels(); buildVoicePanel();
};
refreshLabels();

/* =========================================================
   화면 표시
========================================================= */
const logEl = document.getElementById("log");
const emptyEl = document.getElementById("empty");
const statusEl = document.getElementById("status");
const micMe = document.getElementById("micMe");
const micThem = document.getElementById("micThem");

function setStatus(msg) { statusEl.textContent = msg; }
function escapeHtml(s){ return s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function addBubble(side, whoLang, original, translated, speakLang) {
  emptyEl.style.display = "none";
  const b = document.createElement("div");
  b.className = "bubble " + side;
  b.innerHTML =
    `<div class="who">${L[whoLang].flag} ${escapeHtml(L[whoLang].name)}</div>` +
    `<div class="orig" dir="auto">${escapeHtml(original)}</div>` +
    `<div class="trans" dir="auto">${escapeHtml(translated)}</div>` +
    `<div class="replay">🔊 다시 듣기</div>`;
  b.querySelector(".replay").onclick = () => speak(translated, speakLang);
  logEl.appendChild(b);
  logEl.scrollTop = logEl.scrollHeight;
}

/* =========================================================
   번역: MyMemory 무료 API (키 불필요, 30여 개 언어)
========================================================= */
async function translate(text, from, to) {
  const langpair = L[from].mm + "|" + L[to].mm;
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${encodeURIComponent(langpair)}`;
  const res = await fetch(url);
  const data = await res.json();
  const out = data && data.responseData && data.responseData.translatedText;
  if (!out) throw new Error("no result");
  if (/MYMEMORY WARNING|USED ALL AVAILABLE|INVALID LANGUAGE|QUERY LENGTH LIMIT/i.test(out)) throw new Error(out);
  return out;
}

/* =========================================================
   읽어주기 (TTS) + 목소리 선택 (남/여 · 여러 목소리)
========================================================= */
let voicePref = {}, genderPref = {};   // {langCode: voiceURI}, {langCode: 'M'|'F'}
try {
  voicePref  = JSON.parse(localStorage.getItem("voicePref")  || "{}");
  genderPref = JSON.parse(localStorage.getItem("genderPref") || "{}");
} catch (_) {}
function save() {
  try { localStorage.setItem("voicePref", JSON.stringify(voicePref)); localStorage.setItem("genderPref", JSON.stringify(genderPref)); } catch (_) {}
}

function allVoices() { return ("speechSynthesis" in window) ? speechSynthesis.getVoices() : []; }
function voicesFor(langCode) {
  const base = L[langCode].tts.toLowerCase();
  const prefix = base.split("-")[0];
  return allVoices().filter(v => v.lang && (v.lang.toLowerCase() === base || v.lang.toLowerCase().startsWith(prefix)));
}
// 목소리 이름으로 성별 추정 (기기에 성별 정보가 있을 때만)
function guessGender(v) {
  const n = ((v.name || "") + " " + (v.voiceURI || "")).toLowerCase();
  if (/female|woman|여성|여자|femme|mujer|weiblich|feminine/.test(n)) return "F";
  if (/\bmale\b|\bman\b|남성|남자|homme|hombre|männlich|masculine/.test(n)) return "M";
  if (/samantha|victoria|karen|moira|tessa|fiona|serena|zira|heami|yuna|sora|nova|amelie|amélie|anna|paulina|alice|ellen|milena|luciana|ioana|laura|zosia|nicky|allison|\bava\b|susan|kyoko|female/.test(n)) return "F";
  if (/daniel|\balex\b|fred|thomas|rishi|david|\bmark\b|george|xander|diego|jorge|yannick|luca|maged|\bguy\b|aaron|male/.test(n)) return "M";
  return "";
}
function getVoiceFor(langCode) {
  const list = voicesFor(langCode);
  if (!list.length) return null;
  const uri = voicePref[langCode];
  if (uri) { const hit = list.find(v => v.voiceURI === uri); if (hit) return hit; }
  const g = genderPref[langCode];
  if (g) { const gh = list.find(v => guessGender(v) === g); if (gh) return gh; }
  return list[0];
}

let ttsTimer = null;
// 견고한 읽어주기: 엔진 깨우기(resume) + 선택 목소리가 무음이면 기본 목소리로 재시도
function speakRobust(text, langCode, onDone) {
  const synth = ("speechSynthesis" in window) ? window.speechSynthesis : null;
  if (!synth || !text) { if (onDone) onDone(); return; }
  let finished = false;
  const done = () => { if (finished) return; finished = true; clearInterval(ttsTimer); if (onDone) onDone(); };

  try { synth.resume(); } catch (_) {}   // 멈춰 있으면 깨우기 (크롬 버그 대응)
  try { synth.cancel(); } catch (_) {}   // 이전 발화 정리

  const start = (useChosen) => {
    let started = false;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = L[langCode].tts;
    if (useChosen) { const v = getVoiceFor(langCode); if (v) u.voice = v; }
    u.rate = 0.95;
    u.onstart = () => { started = true; };
    u.onend = () => done();
    u.onerror = () => {
      // 선택한 목소리로 실패하면 기본 목소리로 한 번 더 시도
      if (useChosen && !started) { try { synth.cancel(); } catch (_) {} setTimeout(() => start(false), 80); }
      else done();
    };
    try { synth.speak(u); } catch (_) { done(); return; }

    clearInterval(ttsTimer);
    ttsTimer = setInterval(() => { try { synth.resume(); } catch (_) {} }, 5000); // 긴 문장 중간에 멈추는 것 방지

    // 1.8초 안에 소리가 안 나오면(무음) 기본 목소리로 한 번 더
    setTimeout(() => {
      if (!started && !finished && useChosen) { try { synth.cancel(); } catch (_) {} start(false); }
    }, 1800);
    // 최종 안전장치
    setTimeout(done, Math.min(20000, 2800 + text.length * 90));
  };

  setTimeout(() => start(true), 70); // cancel 직후 살짝 대기 → 모바일 발화 유실 방지
}
function speak(text, langCode) { speakRobust(text, langCode); }

/* ----- 목소리 설정 패널 ----- */
const voicePanel = document.getElementById("voicePanel");
const voiceToggle = document.getElementById("voiceToggle");
voiceToggle.onclick = () => { voicePanel.classList.toggle("open"); buildVoicePanel(); };
function previewVoice(code) { speak(L[code].hello || "Hello", code); }

function buildVoicePanel() {
  if (!voicePanel || !voicePanel.classList.contains("open")) return;
  const langs = [...new Set([myLangEl.value, theirLangEl.value])];
  voicePanel.innerHTML = "";
  langs.forEach(code => {
    const list = voicesFor(code);
    const row = document.createElement("div");
    row.className = "vrow";
    const title = document.createElement("div");
    title.className = "vtitle";
    title.textContent = `${L[code].flag} ${L[code].name} 목소리`;
    row.appendChild(title);

    if (!list.length) {
      const none = document.createElement("div");
      none.className = "vnone";
      none.textContent = `이 기기에 ${L[code].name} 목소리가 없어요. (폰 설정 → 언어/음성/TTS에서 추가 가능)`;
      row.appendChild(none); voicePanel.appendChild(row); return;
    }

    // 목소리 드롭다운
    const sel = document.createElement("select");
    sel.className = "vsel";
    list.forEach(v => {
      const g = guessGender(v);
      const tag = g === "F" ? "🚺 " : g === "M" ? "🚹 " : "🔊 ";
      sel.appendChild(new Option(tag + v.name, v.voiceURI));
    });
    const cur = getVoiceFor(code); if (cur) sel.value = cur.voiceURI;
    sel.onchange = () => { voicePref[code] = sel.value; delete genderPref[code]; save(); previewVoice(code); };

    // 남/여 버튼
    const gender = document.createElement("div");
    gender.className = "vgender";
    [["F", "🚺 여자"], ["M", "🚹 남자"]].forEach(([g, label]) => {
      const b = document.createElement("button");
      b.textContent = label;
      if (genderPref[code] === g) b.classList.add("sel");
      b.onclick = () => {
        const match = list.find(v => guessGender(v) === g);
        if (match) { genderPref[code] = g; voicePref[code] = match.voiceURI; save(); buildVoicePanel(); previewVoice(code); }
        else { setStatus(`이 기기의 ${L[code].name}엔 ${g === "F" ? "여자" : "남자"} 목소리 정보가 없어요. 목록에서 직접 골라 미리듣기 해보세요.`); }
      };
      gender.appendChild(b);
    });

    // 미리듣기
    const play = document.createElement("button");
    play.className = "vplay"; play.textContent = "▶️ 미리듣기";
    play.onclick = () => { voicePref[code] = sel.value; save(); previewVoice(code); };

    const ctrl = document.createElement("div"); ctrl.className = "vctrl";
    ctrl.appendChild(gender); ctrl.appendChild(sel); ctrl.appendChild(play);
    row.appendChild(ctrl);
    voicePanel.appendChild(row);
  });
}

if ("speechSynthesis" in window) {
  speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); buildVoicePanel(); };
}

/* =========================================================
   음성 인식 (STT)
========================================================= */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizing = false, currentRec = null;
if (!SR) {
  setStatus("⚠️ 이 브라우저는 음성 인식을 지원하지 않아요 (안드로이드 크롬 권장)");
}

async function listen(fromLang, toLang, side, micBtn) {
  if (!SR) { setStatus("⚠️ 안드로이드 크롬에서 음성 인식이 가장 잘 돼요."); return; }
  if (recognizing) { try { currentRec && currentRec.stop(); } catch (_) {} return; } // 다시 누르면 바로 끝내기
  speechSynthesis.cancel();
  micBtn.classList.add("listening");
  const text = await recognizeUntilSilence(fromLang);   // 멈추면 3초 뒤 종료
  micBtn.classList.remove("listening");
  if (!text) { setStatus("🔇 말소리가 안 들렸어요. 다시 눌러보세요."); return; }
  setStatus(`🌐 ${L[toLang].name}로 번역 중…`);
  try {
    const translated = await translate(text, fromLang, toLang);
    addBubble(side, fromLang, text, translated, toLang);
    speak(translated, toLang);
    setStatus(`✅ ${L[toLang].name}로 전달했어요`);
  } catch (err) {
    setStatus(/USED ALL AVAILABLE/i.test(err.message)
      ? "⚠️ 오늘 무료 번역 사용량을 다 썼어요. 내일 다시 되거나, 자체 번역서버로 바꿀 수 있어요."
      : "⚠️ 번역 실패 — 인터넷 연결을 확인하세요.");
  }
}

/* =========================================================
   🎧 자동(핸즈프리) 통역 모드
   한 번 켜두면 번갈아 말할 때마다 자동으로 인식→번역→읽기
========================================================= */
const autoBtn = document.getElementById("autoBtn");
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
let autoMode = false, turnLang = null;
if (!SR) autoBtn.disabled = true;

function highlightTurn(lang) {
  const mine = lang === myLangEl.value;
  micMe.classList.toggle("listening", mine);
  micThem.classList.toggle("listening", !mine);
}

// 침묵 감지: 말하는 동안 계속 듣고, 멈춘 뒤 SILENCE_MS 지나면 종료 → 그때 번역
const SILENCE_MS = 3000; // 말을 멈추고 이만큼(3초) 지나면 번역 시작
function recognizeUntilSilence(lang) {
  return new Promise((resolve) => {
    if (!SR) { resolve(null); return; }
    const rec = new SR(); currentRec = rec;
    rec.lang = L[lang].stt; rec.interimResults = true; rec.continuous = true; rec.maxAlternatives = 1;
    let finalText = "", silenceTimer = null;
    const arm = () => { clearTimeout(silenceTimer); silenceTimer = setTimeout(() => { try { rec.stop(); } catch (_) {} }, SILENCE_MS); };
    rec.onstart = () => { recognizing = true; setStatus(`🎙️ ${L[lang].flag} ${L[lang].name} 말하세요… (멈추면 ${SILENCE_MS / 1000}초 뒤 번역)`); };
    rec.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += t + " "; else interim += t;
      }
      setStatus("📝 " + (finalText + interim).trim());
      arm(); // 말할 때마다 타이머 리셋 → 계속 말하면 계속 들음
    };
    rec.onerror = (e) => {
      if (e.error === "not-allowed") { setStatus("🎤 마이크 권한을 허용해 주세요."); autoStop(); }
      else if (e.error === "language-not-supported") setStatus("⚠️ 이 언어는 이 기기에서 음성 인식이 안 돼요.");
    };
    rec.onend = () => { clearTimeout(silenceTimer); recognizing = false; resolve(finalText.trim()); };
    try { rec.start(); } catch (_) { resolve(null); }
  });
}

// 번역문을 소리 내어 읽고, 다 읽으면 resolve (자동 루프용)
function speakThen(text, lang) {
  return new Promise((resolve) => speakRobust(text, lang, resolve));
}

async function autoLoop() {
  while (autoMode) {
    const from = turnLang;
    const to = (from === myLangEl.value) ? theirLangEl.value : myLangEl.value;
    highlightTurn(from);
    const text = await recognizeUntilSilence(from);
    if (!autoMode) break;
    if (!text) { await sleep(200); continue; }         // 말소리 없으면 계속 대기
    setStatus(`🌐 ${L[to].name}로 번역 중…`);
    let translated;
    try { translated = await translate(text, from, to); }
    catch (e) {
      setStatus(/USED ALL AVAILABLE/i.test(e.message)
        ? "⚠️ 오늘 무료 번역 사용량을 다 썼어요."
        : "⚠️ 번역 실패 — 인터넷 확인");
      await sleep(600); continue;
    }
    addBubble((from === myLangEl.value) ? "me" : "them", from, text, translated, to);
    await speakThen(translated, to);
    if (!autoMode) break;
    await sleep(250);          // 방금 읽은 소리를 다시 듣지 않도록 잠깐 쉼
    turnLang = to;             // 이제 상대가 대답할 차례
  }
}

// 마이크 권한 명시적으로 요청 (분명한 팝업 + 차단 시 안내)
async function ensureMic() {
  try {
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      s.getTracks().forEach((t) => t.stop()); // 권한만 확인하고 바로 해제
    }
    return true;
  } catch (e) { return false; }
}

async function autoStart() {
  if (!SR) { setStatus("⚠️ 안드로이드 크롬에서 음성 인식이 가장 잘 돼요."); return; }
  if (callActive) { setStatus("📞 통역 통화 중에는 자동 모드를 쓸 수 없어요."); return; }
  setStatus("🎤 마이크 권한을 확인하는 중… 팝업이 뜨면 ‘허용’을 눌러주세요");
  const ok = await ensureMic();
  if (!ok) {
    setStatus("🎤 마이크가 꺼져 있어요. 주소창 🔒(자물쇠) → 권한 → 마이크 → 허용 후 다시 시작하세요.");
    return;
  }
  autoMode = true; turnLang = myLangEl.value;
  autoBtn.textContent = "⏹ 자동 통역 정지";
  autoBtn.classList.add("on");
  emptyEl.style.display = "none";
  autoLoop();
}
function autoStop() {
  autoMode = false;
  autoBtn.textContent = "🎧 자동 통역 시작 (핸즈프리)";
  autoBtn.classList.remove("on");
  try { currentRec && currentRec.stop(); } catch (_) {}
  try { speechSynthesis.cancel(); } catch (_) {}
  clearInterval(ttsTimer);
  micMe.classList.remove("listening"); micThem.classList.remove("listening");
  setStatus("정지됨 · 버튼을 누르면 다시 시작해요");
}
autoBtn.onclick = () => (autoMode ? autoStop() : autoStart());

// 차례 강제 지정(자동 모드) / 한 번만 말하기(수동 모드)
function setTurn(lang) { turnLang = lang; try { currentRec && currentRec.stop(); } catch (_) {} }
micMe.onclick   = () => (autoMode ? setTurn(myLangEl.value)    : listen(myLangEl.value, theirLangEl.value, "me", micMe));
micThem.onclick = () => (autoMode ? setTurn(theirLangEl.value) : listen(theirLangEl.value, myLangEl.value, "them", micThem));

/* =========================================================
   📞 앱 안 통역 통화 (WebRTC / PeerJS) — 상대도 이 앱 필요
   내가 말함 → 내 언어로 인식 → 상대 언어로 번역 → 전송
   → 상대 폰이 상대 언어로 읽어줌 (반대도 동일)
========================================================= */
let peer = null, conn = null, peerLang = null, callActive = false, speaking = false, peerLibLoading = null;
const gid = (id) => document.getElementById(id);
function setCallStatus(m) { gid("callStatus").textContent = m || ""; }

function loadPeerJS() {
  if (window.Peer) return Promise.resolve();
  if (peerLibLoading) return peerLibLoading;
  peerLibLoading = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js";
    s.onload = resolve; s.onerror = () => reject(new Error("load fail"));
    document.head.appendChild(s);
  });
  return peerLibLoading;
}
const PEER_OPTS = { config: { iceServers: [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
  { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" }
] } };
function randomCode() {
  const c = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let s = "";
  for (let i = 0; i < 5; i++) s += c[Math.floor(Math.random() * c.length)];
  return s;
}

gid("callToggle").onclick = () => gid("callPanel").classList.toggle("open");
gid("hostBtn").onclick = hostRoom;
gid("joinBtn").onclick = () => { gid("joinArea").style.display = "block"; gid("hostArea").style.display = "none"; setCallStatus(""); };
gid("connectBtn").onclick = () => { const v = gid("codeInput").value.trim().toUpperCase(); if (v) joinRoom(v); };
gid("copyCode").onclick = () => { try { navigator.clipboard.writeText(gid("roomCode").textContent); setCallStatus("코드를 복사했어요!"); } catch (_) {} };
gid("hangBtn").onclick = () => endCall(true);
gid("callBtn").onclick = () => (callActive ? stopCall() : startCall());
gid("chatSend").onclick = sendChat;
gid("chatInput").addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); sendChat(); } });

async function hostRoom() {
  if (autoMode) autoStop();
  setCallStatus("연결 준비 중…");
  try { await loadPeerJS(); } catch (e) { setCallStatus("⚠️ 통화 기능을 못 불러왔어요 (인터넷 확인)"); return; }
  const code = randomCode();
  peer = new Peer("sgpro-" + code, PEER_OPTS);
  peer.on("open", () => {
    gid("roomCode").textContent = code;
    gid("hostArea").style.display = "block"; gid("joinArea").style.display = "none";
    setCallStatus("상대가 참여하길 기다리는 중…");
  });
  peer.on("connection", (c) => { conn = c; setupConn(); });
  peer.on("error", onPeerError);
}
async function joinRoom(code) {
  if (autoMode) autoStop();
  setCallStatus("연결 중…");
  try { await loadPeerJS(); } catch (e) { setCallStatus("⚠️ 통화 기능을 못 불러왔어요 (인터넷 확인)"); return; }
  peer = new Peer(PEER_OPTS);
  peer.on("open", () => { conn = peer.connect("sgpro-" + code, { reliable: true }); setupConn(); });
  peer.on("error", onPeerError);
}
function onPeerError(e) {
  const t = (e && e.type) || "";
  if (t === "peer-unavailable") setCallStatus("⚠️ 그 코드의 방이 없어요. 코드를 다시 확인하세요.");
  else if (t === "unavailable-id") setCallStatus("코드가 겹쳤어요 — '방 만들기'를 한 번 더 눌러주세요.");
  else setCallStatus("⚠️ 연결 문제: " + t + " — 네트워크를 확인하세요.");
}
function setupConn() {
  conn.on("open", () => {
    conn.send({ type: "hello", lang: myLangEl.value });
    gid("callSetup").style.display = "none"; gid("callLive").style.display = "block";
    gid("chatBar").classList.add("show");   // 연결되면 채팅 입력줄 표시
    setCallStatus("");
  });
  conn.on("data", onCallData);
  conn.on("close", () => { setCallStatus("상대가 연결을 끊었어요."); endCall(false); });
}
async function onCallData(msg) {
  if (!msg) return;
  if (msg.type === "hello") {
    peerLang = msg.lang;
    gid("peerLangLabel").textContent = L[peerLang] ? (L[peerLang].flag + " " + L[peerLang].name) : msg.lang;
    return;
  }
  if (msg.type === "chat") {   // 상대가 보낸 채팅 (이미 내 언어로 번역돼 옴) — 자동 낭독은 안 함
    addBubble("them", msg.from, msg.orig, msg.tr, myLangEl.value);
    return;
  }
  if (msg.type === "speech") {
    speaking = true;
    try { currentRec && currentRec.stop(); } catch (_) {}
    addBubble("them", msg.from, msg.orig, msg.tr, myLangEl.value);
    await speakThen(msg.tr, myLangEl.value);   // 이미 내 언어로 번역돼서 옴
    speaking = false;
  }
}

// 채팅 보내기: 내 언어로 입력 → 상대 언어로 번역해서 전송
async function sendChat() {
  const inp = gid("chatInput");
  const text = inp.value.trim();
  if (!text || !conn || !conn.open) return;
  inp.value = "";
  let tr = text;
  try { if (peerLang) tr = await translate(text, myLangEl.value, peerLang); } catch (_) {}
  conn.send({ type: "chat", orig: text, tr: tr, from: myLangEl.value });
  addBubble("me", myLangEl.value, text, tr, peerLang || myLangEl.value);
}
async function callLoop() {
  while (callActive) {
    if (speaking) { await sleep(150); continue; }         // 상대 말 재생 중엔 안 들음
    const text = await recognizeUntilSilence(myLangEl.value);
    if (!callActive) break;
    if (speaking || !text) { await sleep(80); continue; }
    let tr = text;
    try { if (peerLang) tr = await translate(text, myLangEl.value, peerLang); } catch (_) {}
    if (conn && conn.open) conn.send({ type: "speech", orig: text, tr: tr, from: myLangEl.value });
    addBubble("me", myLangEl.value, text, tr, peerLang || myLangEl.value);
  }
}
async function startCall() {
  if (!conn || !conn.open) { setCallStatus("아직 연결되지 않았어요."); return; }
  const ok = await ensureMic();
  if (!ok) { setStatus("🎤 마이크 권한을 허용해 주세요."); return; }
  callActive = true;
  gid("callBtn").textContent = "⏹ 통화 정지"; gid("callBtn").classList.add("on");
  if (autoBtn) autoBtn.disabled = true;
  callLoop();
}
function stopCall() {
  callActive = false;
  gid("callBtn").textContent = "📞 통역 통화 시작"; gid("callBtn").classList.remove("on");
  try { currentRec && currentRec.stop(); } catch (_) {}
  try { speechSynthesis.cancel(); } catch (_) {}
  if (autoBtn) autoBtn.disabled = !SR;
}
function endCall(sendClose) {
  stopCall();
  try { if (sendClose && conn) conn.close(); } catch (_) {}
  try { if (peer) peer.destroy(); } catch (_) {}
  peer = null; conn = null; peerLang = null;
  gid("callLive").style.display = "none"; gid("callSetup").style.display = "block";
  gid("hostArea").style.display = "none"; gid("joinArea").style.display = "none";
  gid("chatBar").classList.remove("show");
}

/* =========================================================
   PWA: 폰에 설치(저장) 지원
========================================================= */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
let deferredPrompt = null;
const installBanner = document.getElementById("install");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.style.display = "block";
});
document.getElementById("installBtn").onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.style.display = "none";
};
window.addEventListener("appinstalled", () => { installBanner.style.display = "none"; });
</script>
