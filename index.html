<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#FEE500" />
<title>Lingo · 번역 메신저</title>

<!-- 폰에 앱처럼 설치(저장)하기 위한 설정 -->
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Lingo" />
<meta name="mobile-web-app-capable" content="yes" />

<style>
  :root{
    --bg1:#eef1f8; --bg2:#f7f8fc;
    --card:#ffffff; --ink:#0f172a; --muted:#6b7280; --faint:#9aa3b2;
    --line:#e8ebf2;
    --brand:#6d5cf0; --brand-soft:#eef0ff;
    --green:#12b76a; --sky:#0ea5e9; --danger:#ef4444;
    --kakao:#FEE500; --kakao-ink:#191919; --kakao-bg:#b2c7da;
    --r:18px; --r-sm:12px;
    --sh:0 8px 24px rgba(24,20,60,.08); --sh-sm:0 2px 8px rgba(24,20,60,.06);
    --grad:linear-gradient(135deg,#6366f1 0%,#8b5cf6 55%,#a855f7 100%);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Pretendard","Apple SD Gothic Neo","Malgun Gothic",-apple-system,system-ui,sans-serif;
    background: linear-gradient(180deg,var(--bg1),var(--bg2));
    color: var(--ink);
    display: flex; flex-direction: column;
    height: 100dvh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  /* ===== 브랜드 헤더 ===== */
  header {
    display: flex; align-items: center; gap: 11px;
    padding: calc(12px + env(safe-area-inset-top)) 18px 13px;
    background: var(--kakao); color: var(--kakao-ink);
    box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  .logo {
    width: 40px; height: 40px; border-radius: 13px; flex: 0 0 auto;
    background: rgba(0,0,0,.08); display: grid; place-items: center; font-size: 21px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.06);
  }
  .brandtext { display: flex; flex-direction: column; line-height: 1.18; }
  .wordmark { font-size: 21px; font-weight: 800; letter-spacing: -.4px; }
  .tagline { font-size: 11.5px; opacity: .7; font-weight: 500; }

  /* ===== 언어 선택 ===== */
  .pickers { display: flex; align-items: flex-end; gap: 8px; padding: 13px 14px 6px; }
  .picker { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .picker label { font-size: 11px; color: var(--muted); font-weight: 700; padding-left: 4px; }
  select {
    font-family: inherit; font-size: 15px; font-weight: 700;
    border: 1px solid var(--line); border-radius: var(--r-sm); padding: 11px 10px;
    background: var(--card); color: var(--brand); width: 100%;
    appearance: none; text-align: center; cursor: pointer; box-shadow: var(--sh-sm);
  }
  .swap {
    flex: 0 0 auto; width: 42px; height: 42px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--card); color: var(--brand);
    font-size: 18px; cursor: pointer; box-shadow: var(--sh-sm);
  }
  .swap:active { transform: rotate(180deg) scale(.92); transition: transform .25s; }

  /* ===== 대화 로그 ===== */
  .log {
    flex: 1; overflow-y: auto; padding: 16px 14px;
    background: var(--kakao-bg);
    display: flex; flex-direction: column; gap: 10px;
    -webkit-user-select: text; user-select: text;
  }
  .empty { margin: auto; text-align: center; color: #55677a; font-size: 15px; line-height: 1.7; }
  .empty .big { font-size: 44px; margin-bottom: 6px; }
  .bubble { max-width: 82%; padding: 11px 15px; border-radius: 20px; box-shadow: var(--sh-sm); animation: rise .18s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .bubble .who { font-size: 11px; font-weight: 700; opacity: .75; margin-bottom: 3px; }
  .bubble .orig { font-size: 14px; opacity: .6; }
  .bubble .trans { font-size: 20px; font-weight: 700; margin-top: 3px; line-height: 1.32; }
  .bubble .replay { font-size: 12px; opacity: .65; margin-top: 6px; cursor: pointer; display: inline-block; }
  .me   { align-self: flex-end;   background: var(--kakao); color: var(--kakao-ink); border-bottom-right-radius: 6px; }
  .them { align-self: flex-start; background: #fff; color: var(--ink); border-bottom-left-radius: 6px; }

  .status { text-align: center; font-size: 13px; color: var(--muted); font-weight: 600; padding: 7px 12px; min-height: 30px; }

  /* ===== 마이크 버튼 ===== */
  .mics { display: flex; gap: 10px; padding: 10px 14px calc(14px + env(safe-area-inset-bottom)); }
  .mic {
    flex: 1; font-family: inherit; border: none; border-radius: var(--r);
    padding: 14px 6px; cursor: pointer; color: #fff;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: transform .1s, box-shadow .2s;
  }
  .mic:active { transform: translateY(1px) scale(.99); }
  .mic .icon { font-size: 24px; }
  .mic .label { font-size: 15px; font-weight: 800; }
  .mic .sub { font-size: 11px; opacity: .92; }
  .mic.them { background: linear-gradient(135deg,#0ea5e9,#38bdf8); box-shadow: 0 6px 18px rgba(14,165,233,.35); }
  .mic.me   { background: var(--grad); box-shadow: 0 6px 18px rgba(109,92,240,.35); }
  .mic.listening { animation: ring 1.1s infinite; }
  @keyframes ring { 0%,100%{ box-shadow: 0 6px 18px rgba(109,92,240,.35), 0 0 0 0 rgba(139,92,246,.5);} 50%{ box-shadow: 0 6px 18px rgba(109,92,240,.35), 0 0 0 13px rgba(139,92,246,0);} }
  .mic:disabled { opacity: .45; }

  /* ===== 자동(핸즈프리) 통역 버튼 ===== */
  .autowrap { padding: 10px 14px 0; }
  .auto {
    width: 100%; font-family: inherit; font-size: 16px; font-weight: 800;
    border: none; border-radius: var(--r); padding: 15px; color: #fff;
    background: linear-gradient(135deg,#10b981,#22c55e); box-shadow: 0 6px 18px rgba(16,185,129,.35); cursor: pointer;
    transition: transform .1s;
  }
  .auto:active { transform: translateY(1px); }
  .auto.on { background: linear-gradient(135deg,#ef4444,#f87171); box-shadow: 0 6px 18px rgba(239,68,68,.4); animation: ring 1.1s infinite; }
  .auto:disabled { opacity: .5; }

  /* ===== 접이식 카드 토글 (목소리/통화) ===== */
  .voicebar, .callbar { padding: 0 14px 8px; }
  .voicetoggle, .calltoggle {
    width: 100%; font-family: inherit; font-size: 13px; font-weight: 700;
    color: var(--ink); background: var(--card); border: 1px solid var(--line);
    border-radius: var(--r-sm); padding: 11px 13px; cursor: pointer;
    box-shadow: var(--sh-sm); text-align: left;
  }
  .voicetoggle { color: var(--brand); }
  .calltoggle { color: var(--sky); }

  /* ===== 목소리 설정 패널 ===== */
  .voicepanel { display: none; background: var(--card); border: 1px solid var(--line); border-radius: var(--r-sm); margin-top: 8px; padding: 6px 14px; box-shadow: var(--sh); max-height: 42vh; overflow-y: auto; }
  .voicepanel.open { display: block; }
  .vrow { padding: 10px 0; border-bottom: 1px solid var(--line); }
  .vrow:last-child { border-bottom: none; }
  .vtitle { font-size: 13px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
  .vctrl { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .vgender { display: flex; gap: 6px; }
  .vgender button { font-family: inherit; font-size: 13px; font-weight: 700; border: 1.5px solid var(--line); background: var(--card); color: var(--muted); border-radius: 999px; padding: 7px 12px; cursor: pointer; }
  .vgender button.sel { border-color: var(--brand); background: var(--brand-soft); color: var(--brand); }
  .vsel { flex: 1 1 130px; min-width: 110px; font-family: inherit; font-size: 13px; font-weight: 600; border: 1.5px solid var(--line); border-radius: 10px; padding: 9px; background: var(--card); color: var(--ink); }
  .vplay { font-family: inherit; font-size: 13px; font-weight: 700; border: none; background: var(--sky); color: #fff; border-radius: 10px; padding: 9px 13px; cursor: pointer; }
  .vnone { font-size: 12px; color: var(--faint); line-height: 1.5; }

  /* ===== 통역 통화 패널 ===== */
  .callpanel { display: none; background: var(--card); border: 1px solid var(--line); border-radius: var(--r-sm); margin-top: 8px; padding: 14px; box-shadow: var(--sh); }
  .callpanel.open { display: block; }
  .callrow { display: flex; gap: 8px; }
  .cbtn { flex: 1; font-family: inherit; font-size: 14px; font-weight: 800; border: none; border-radius: var(--r-sm); padding: 12px 8px; cursor: pointer; background: linear-gradient(135deg,#0ea5e9,#38bdf8); color: #fff; box-shadow: 0 4px 12px rgba(14,165,233,.28); transition: transform .1s; }
  .cbtn:active { transform: translateY(1px); }
  .cbtn.join { background: var(--grad); box-shadow: 0 4px 12px rgba(109,92,240,.28); }
  .cbtn.call { width: 100%; margin-top: 8px; background: linear-gradient(135deg,#10b981,#22c55e); box-shadow: 0 4px 12px rgba(16,185,129,.3); font-size: 16px; }
  .cbtn.call.on { background: linear-gradient(135deg,#ef4444,#f87171); box-shadow: 0 4px 12px rgba(239,68,68,.35); }
  .cbtn.hang { width: 100%; margin-top: 8px; background: #94a3b8; box-shadow: none; }
  .ccode { font-size: 36px; font-weight: 900; letter-spacing: 8px; text-align: center; color: var(--brand); padding: 16px; background: var(--brand-soft); border-radius: var(--r-sm); margin-top: 12px; }
  .cinput { width: 100%; font-family: inherit; font-size: 24px; font-weight: 800; text-align: center; letter-spacing: 6px; text-transform: uppercase; border: 1.5px solid var(--line); border-radius: var(--r-sm); padding: 12px; margin-top: 10px; }
  .cnote { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; line-height: 1.55; }
  .clive { font-size: 15px; font-weight: 800; text-align: center; color: #0f766e; }
  .ccopy { font-family: inherit; font-size: 12px; font-weight: 700; border: none; background: var(--brand-soft); color: var(--brand); border-radius: 999px; padding: 7px 16px; margin: 10px auto 0; cursor: pointer; display: block; }

  /* ===== 채팅 입력줄 ===== */
  .chatbar { display: none; gap: 8px; padding: 10px 14px 0; }
  .chatbar.show { display: flex; }
  .chatinput { flex: 1; min-width: 0; font-family: inherit; font-size: 16px; border: 1.5px solid var(--line); border-radius: var(--r); padding: 12px 15px; background: var(--card); box-shadow: var(--sh-sm); }
  .chatinput:focus { outline: none; border-color: var(--kakao); }
  .chatsend { font-family: inherit; font-size: 15px; font-weight: 800; border: none; border-radius: var(--r); padding: 12px 18px; background: var(--kakao); color: var(--kakao-ink); cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.12); }

  /* ===== 채팅 자동번역 언어 리스트 ===== */
  .chatlangbar { display: none; align-items: center; gap: 8px; padding: 8px 14px 0; font-size: 12px; font-weight: 600; color: var(--muted); }
  .chatlangbar.show { display: flex; }
  .chatlang { flex: 1; min-width: 0; font-family: inherit; font-size: 13px; font-weight: 700; border: 1.5px solid var(--line); border-radius: 10px; padding: 8px 10px; background: var(--card); color: var(--ink); appearance: none; cursor: pointer; }

  /* ===== 설치 안내 배너 ===== */
  .install { display: none; margin: 0 14px 8px; background: var(--brand-soft); color: var(--brand); font-size: 13px; font-weight: 600; padding: 10px 14px; text-align: center; border-radius: var(--r-sm); }
  .install button { font-family: inherit; margin-left: 8px; border: none; background: var(--grad); color: #fff; font-weight: 700; padding: 6px 14px; border-radius: 999px; cursor: pointer; }

  /* ===== 첫 설정 (언어 선택 온보딩) ===== */
  .onboarding { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(160deg, #FEE500, #FFD400); }
  .ob-card { background: #fff; border-radius: 26px; padding: 30px 22px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 22px 55px rgba(0,0,0,.25); }
  .ob-logo { width: 66px; height: 66px; border-radius: 20px; background: var(--grad); display: grid; place-items: center; font-size: 34px; margin: 0 auto 12px; box-shadow: 0 8px 20px rgba(109,92,240,.35); }
  .ob-brand { font-size: 28px; font-weight: 800; color: var(--ink); letter-spacing: -.5px; }
  .ob-title { font-size: 13px; color: var(--muted); margin: 6px 0 20px; font-weight: 600; }
  .ob-langs { display: flex; flex-direction: column; gap: 10px; }
  .ob-langs button { font-family: inherit; font-size: 18px; font-weight: 800; border: 2px solid var(--line); background: #fff; color: var(--ink); border-radius: 16px; padding: 15px; cursor: pointer; transition: transform .1s, border-color .1s, background .1s; }
  .ob-langs button:active { transform: scale(.98); }
  .ob-langs button:hover { border-color: var(--kakao); background: #FFFBEA; }
</style>
</head>
<body>
  <div class="onboarding" id="onboarding">
    <div class="ob-card">
      <div class="ob-logo">🌐</div>
      <div class="ob-brand">Lingo</div>
      <div class="ob-title">언어 · Language · 语言 · 言語</div>
      <div class="ob-langs">
        <button data-uilang="ko" data-my="ko">🇰🇷 한국어</button>
        <button data-uilang="en" data-my="en">🇺🇸 English</button>
        <button data-uilang="zh" data-my="zh">🇨🇳 中文</button>
        <button data-uilang="ja" data-my="ja">🇯🇵 日本語</button>
      </div>
    </div>
  </div>

  <header>
    <span class="logo">🌐</span>
    <div class="brandtext">
      <span class="wordmark">Lingo</span>
      <span class="tagline" data-i18n="tagline">언어가 달라도, 막힘없이</span>
    </div>
  </header>

  <div class="pickers">
    <div class="picker">
      <label data-i18n="lbl_my">🙋 내 언어</label>
      <select id="myLang"></select>
    </div>
    <button class="swap" id="swap" title="swap">⇄</button>
    <div class="picker">
      <label data-i18n="lbl_their">🗣️ 상대 언어</label>
      <select id="theirLang"></select>
    </div>
  </div>

  <div class="voicebar">
    <button class="voicetoggle" id="voiceToggle" data-i18n="voice_toggle">🔊 목소리 설정 (남 / 여 · 여러 목소리) ▾</button>
    <div class="voicepanel" id="voicePanel"></div>
  </div>

  <div class="callbar">
    <button class="calltoggle" id="callToggle" data-i18n="call_toggle">📞 멀리 있는 사람과 통역 통화 ▾</button>
    <div class="callpanel" id="callPanel">
      <div id="callSetup">
        <div class="callrow">
          <button class="cbtn host" id="hostBtn" data-i18n="host_btn">🆕 방 만들기</button>
          <button class="cbtn join" id="joinBtn" data-i18n="join_btn">🔑 코드로 참여</button>
        </div>
        <div id="hostArea" style="display:none">
          <div class="ccode" id="roomCode">…</div>
          <button class="ccopy" id="copyCode" data-i18n="copy_code">📋 코드 복사</button>
          <div class="cnote" data-i18n="room_note">이 코드를 상대에게 알려주세요. 상대가 참여하면 자동으로 연결돼요.</div>
        </div>
        <div id="joinArea" style="display:none">
          <input id="codeInput" class="cinput" placeholder="코드" data-i18n-ph="code_ph" maxlength="5" autocapitalize="characters" autocomplete="off" />
          <button class="cbtn" id="connectBtn" data-i18n="connect_btn" style="width:100%;margin-top:8px">연결하기</button>
        </div>
        <div class="cnote" id="callStatus"></div>
      </div>
      <div id="callLive" style="display:none">
        <div class="clive"><span data-i18n="connected_label">🟢 연결됨 · 상대 언어:</span> <span id="peerLangLabel">?</span></div>
        <button class="cbtn call" id="callBtn" data-i18n="call_start">📞 통역 통화 시작</button>
        <button class="cbtn hang" id="hangBtn" data-i18n="hang_btn">연결 끊기</button>
        <div class="cnote" data-i18n="earbud_note">🎧 이어폰을 쓰면 소리 겹침 없이 깔끔해요.</div>
      </div>
    </div>
  </div>

  <div class="install" id="install">
    <span data-i18n="install_text">📲 이 앱을 폰에 저장할 수 있어요</span>
    <button id="installBtn" data-i18n="install_btn">설치</button>
  </div>

  <div class="log" id="log">
    <div class="empty" id="empty">
      <div class="big">🎧</div>
      <b>자동 통역 시작</b>을 누르고<br>
      번갈아 말하면 알아서 통역해요.<br>
      <span style="font-size:13px">(스피커폰 통화 옆에 켜두세요)</span>
    </div>
  </div>

  <div class="status" id="status" data-i18n="ready">준비됐어요</div>

  <div class="chatlangbar" id="chatLangBar">
    <span data-i18n="chat_lang_label">💬 내가 볼 번역 언어</span>
    <select id="chatLang" class="chatlang"></select>
  </div>

  <div class="chatbar" id="chatBar">
    <input id="chatInput" class="chatinput" placeholder="메시지 입력…" data-i18n-ph="chat_ph" autocomplete="off" />
    <button id="chatSend" class="chatsend" data-i18n="chat_send">보내기</button>
  </div>

  <div class="autowrap">
    <button class="auto" id="autoBtn" data-i18n="auto_start">🎧 자동 통역 시작 (핸즈프리)</button>
  </div>

  <div class="mics">
    <button class="mic them" id="micThem">
      <span class="icon">🎤</span>
      <span class="label" id="themLabel">상대</span>
      <span class="sub" data-i18n="mic_them_sub">상대가 말해요</span>
    </button>
    <button class="mic me" id="micMe">
      <span class="icon">🎤</span>
      <span class="label" id="meLabel">나</span>
      <span class="sub" data-i18n="mic_me_sub">내가 말해요</span>
    </button>
  </div>

<script>
/* =========================================================
   전 세계 언어 목록
   stt: 음성인식 코드 / tts: 읽어주기 코드 / mm: 무료 번역 API 코드
========================================================= */
const LANGS = [
  { code:"ko",    name:"한국어",      flag:"🇰🇷", stt:"ko-KR", tts:"ko-KR", mm:"ko",    hello:"안녕하세요, 반갑습니다" },
  { code:"en",    name:"English",     flag:"🇺🇸", stt:"en-US", tts:"en-US", mm:"en",    hello:"Hello, nice to meet you" },
  { code:"ja",    name:"日本語",      flag:"🇯🇵", stt:"ja-JP", tts:"ja-JP", mm:"ja",    hello:"こんにちは、はじめまして" },
  { code:"zh",    name:"中文(简体)",  flag:"🇨🇳", stt:"zh-CN", tts:"zh-CN", mm:"zh-CN", hello:"你好，很高兴认识你" },
  { code:"zh-TW", name:"中文(繁體)",  flag:"🇹🇼", stt:"zh-TW", tts:"zh-TW", mm:"zh-TW", hello:"你好，很高興認識你" },
  { code:"fr",    name:"Français",    flag:"🇫🇷", stt:"fr-FR", tts:"fr-FR", mm:"fr",    hello:"Bonjour, enchanté" },
  { code:"de",    name:"Deutsch",     flag:"🇩🇪", stt:"de-DE", tts:"de-DE", mm:"de",    hello:"Hallo, freut mich" },
  { code:"es",    name:"Español",     flag:"🇪🇸", stt:"es-ES", tts:"es-ES", mm:"es",    hello:"Hola, encantado" },
  { code:"it",    name:"Italiano",    flag:"🇮🇹", stt:"it-IT", tts:"it-IT", mm:"it",    hello:"Ciao, piacere" },
  { code:"pt",    name:"Português",   flag:"🇧🇷", stt:"pt-BR", tts:"pt-BR", mm:"pt-BR", hello:"Olá, prazer" },
  { code:"ru",    name:"Русский",     flag:"🇷🇺", stt:"ru-RU", tts:"ru-RU", mm:"ru",    hello:"Здравствуйте" },
  { code:"ar",    name:"العربية",     flag:"🇸🇦", stt:"ar-SA", tts:"ar-SA", mm:"ar",    hello:"مرحبا، تشرفنا" },
  { code:"hi",    name:"हिन्दी",       flag:"🇮🇳", stt:"hi-IN", tts:"hi-IN", mm:"hi",    hello:"नमस्ते" },

// gtx(구글) 언어 코드 보정
function gtxCode(c) { return c === "zh" ? "zh-CN" : c === "fil" ? "tl" : c; }

async function translate(text, from, to) {
  // 1) 구글 번역 (고품질) — 브라우저에서 무료로 호출
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${gtxCode(from)}&tl=${gtxCode(to)}&dt=t&q=` + encodeURIComponent(text);
    const r = await fetch(url);
    if (r.ok) {
      const j = await r.json();
      const out = (j && j[0]) ? j[0].map(s => s[0]).filter(Boolean).join("") : "";
      if (out && out.trim()) return out.trim();
    }
  } catch (_) { /* 실패 시 아래 백업으로 */ }

  // 2) MyMemory 백업 (구글이 막히거나 실패할 때)
  const langpair = L[from].mm + "|" + L[to].mm;
  const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${encodeURIComponent(langpair)}`);
  const data = await res.json();
  const out = data && data.responseData && data.responseData.translatedText;
  if (!out) throw new Error("no result");
  if (/MYMEMORY WARNING|USED ALL AVAILABLE|INVALID LANGUAGE|QUERY LENGTH LIMIT/i.test(out)) throw new Error(out);
  return out;
}

/* =========================================================
   읽어주기 (TTS) + 목소리 선택 (남/여 · 여러 목소리)
========================================================= */
let voicePref = {}, genderPref = {};   // {langCode: voiceURI}, {langCode: 'M'|'F'}
try {
  voicePref  = JSON.parse(localStorage.getItem("voicePref")  || "{}");
  genderPref = JSON.parse(localStorage.getItem("genderPref") || "{}");
} catch (_) {}
function save() {
  try { localStorage.setItem("voicePref", JSON.stringify(voicePref)); localStorage.setItem("genderPref", JSON.stringify(genderPref)); } catch (_) {}
}

function allVoices() { return ("speechSynthesis" in window) ? speechSynthesis.getVoices() : []; }
function voicesFor(langCode) {
  const base = L[langCode].tts.toLowerCase();
  const prefix = base.split("-")[0];
  return allVoices().filter(v => v.lang && (v.lang.toLowerCase() === base || v.lang.toLowerCase().startsWith(prefix)));
}
// 목소리 이름으로 성별 추정 (기기에 성별 정보가 있을 때만)
function guessGender(v) {
  const n = ((v.name || "") + " " + (v.voiceURI || "")).toLowerCase();
  if (/female|woman|여성|여자|femme|mujer|weiblich|feminine/.test(n)) return "F";
  if (/\bmale\b|\bman\b|남성|남자|homme|hombre|männlich|masculine/.test(n)) return "M";
  if (/samantha|victoria|karen|moira|tessa|fiona|serena|zira|heami|yuna|sora|nova|amelie|amélie|anna|paulina|alice|ellen|milena|luciana|ioana|laura|zosia|nicky|allison|\bava\b|susan|kyoko|female/.test(n)) return "F";
  if (/daniel|\balex\b|fred|thomas|rishi|david|\bmark\b|george|xander|diego|jorge|yannick|luca|maged|\bguy\b|aaron|male/.test(n)) return "M";
  return "";
}
function getVoiceFor(langCode) {
  const list = voicesFor(langCode);
  if (!list.length) return null;
  const uri = voicePref[langCode];
  if (uri) { const hit = list.find(v => v.voiceURI === uri); if (hit) return hit; }
  const g = genderPref[langCode];
  if (g) { const gh = list.find(v => guessGender(v) === g); if (gh) return gh; }
  return list[0];
}

let ttsTimer = null;
// 견고한 읽어주기: 엔진 깨우기(resume) + 선택 목소리가 무음이면 기본 목소리로 재시도
function speakRobust(text, langCode, onDone) {
  const synth = ("speechSynthesis" in window) ? window.speechSynthesis : null;
  if (!synth || !text) { if (onDone) onDone(); return; }
  let finished = false;
  const done = () => { if (finished) return; finished = true; clearInterval(ttsTimer); if (onDone) onDone(); };

  try { synth.resume(); } catch (_) {}   // 멈춰 있으면 깨우기 (크롬 버그 대응)
  try { synth.cancel(); } catch (_) {}   // 이전 발화 정리

  const start = (useChosen) => {
    let started = false;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = L[langCode].tts;
    if (useChosen) { const v = getVoiceFor(langCode); if (v) u.voice = v; }
    u.rate = 0.95;
    u.onstart = () => { started = true; };
    u.onend = () => done();
    u.onerror = () => {
      // 선택한 목소리로 실패하면 기본 목소리로 한 번 더 시도
      if (useChosen && !started) { try { synth.cancel(); } catch (_) {} setTimeout(() => start(false), 80); }
      else done();
    };
    try { synth.speak(u); } catch (_) { done(); return; }

    clearInterval(ttsTimer);
    ttsTimer = setInterval(() => { try { synth.resume(); } catch (_) {} }, 5000); // 긴 문장 중간에 멈추는 것 방지

    // 1.8초 안에 소리가 안 나오면(무음) 기본 목소리로 한 번 더
    setTimeout(() => {
      if (!started && !finished && useChosen) { try { synth.cancel(); } catch (_) {} start(false); }
    }, 1800);
    // 최종 안전장치
    setTimeout(done, Math.min(20000, 2800 + text.length * 90));
  };

  setTimeout(() => start(true), 70); // cancel 직후 살짝 대기 → 모바일 발화 유실 방지
}
function speak(text, langCode) { speakRobust(text, langCode); }

/* ----- 목소리 설정 패널 ----- */
const voicePanel = document.getElementById("voicePanel");
const voiceToggle = document.getElementById("voiceToggle");
voiceToggle.onclick = () => { voicePanel.classList.toggle("open"); buildVoicePanel(); };
function previewVoice(code) { speak(L[code].hello || "Hello", code); }

function buildVoicePanel() {
  if (!voicePanel || !voicePanel.classList.contains("open")) return;
  const langs = [...new Set([myLangEl.value, theirLangEl.value])];
  voicePanel.innerHTML = "";
  langs.forEach(code => {
    const list = voicesFor(code);
    const row = document.createElement("div");
    row.className = "vrow";
    const title = document.createElement("div");
    title.className = "vtitle";
    title.textContent = `${L[code].flag} ${L[code].name} 목소리`;
    row.appendChild(title);

    if (!list.length) {
      const none = document.createElement("div");
      none.className = "vnone";
      none.textContent = `이 기기에 ${L[code].name} 목소리가 없어요. (폰 설정 → 언어/음성/TTS에서 추가 가능)`;
      row.appendChild(none); voicePanel.appendChild(row); return;
    }

    // 목소리 드롭다운
    const sel = document.createElement("select");
    sel.className = "vsel";
    list.forEach(v => {
      const g = guessGender(v);
      const tag = g === "F" ? "🚺 " : g === "M" ? "🚹 " : "🔊 ";
      sel.appendChild(new Option(tag + v.name, v.voiceURI));
    });
    const cur = getVoiceFor(code); if (cur) sel.value = cur.voiceURI;
    sel.onchange = () => { voicePref[code] = sel.value; delete genderPref[code]; save(); previewVoice(code); };

    // 남/여 버튼
    const gender = document.createElement("div");
    gender.className = "vgender";
    [["F", "🚺 여자"], ["M", "🚹 남자"]].forEach(([g, label]) => {
      const b = document.createElement("button");
      b.textContent = label;
      if (genderPref[code] === g) b.classList.add("sel");
      b.onclick = () => {
        const match = list.find(v => guessGender(v) === g);
        if (match) { genderPref[code] = g; voicePref[code] = match.voiceURI; save(); buildVoicePanel(); previewVoice(code); }
        else { setStatus(`이 기기의 ${L[code].name}엔 ${g === "F" ? "여자" : "남자"} 목소리 정보가 없어요. 목록에서 직접 골라 미리듣기 해보세요.`); }
      };
      gender.appendChild(b);
    });

    // 미리듣기
    const play = document.createElement("button");
    play.className = "vplay"; play.textContent = "▶️ 미리듣기";
    play.onclick = () => { voicePref[code] = sel.value; save(); previewVoice(code); };

    const ctrl = document.createElement("div"); ctrl.className = "vctrl";
    ctrl.appendChild(gender); ctrl.appendChild(sel); ctrl.appendChild(play);
    row.appendChild(ctrl);
    voicePanel.appendChild(row);
  });
}

if ("speechSynthesis" in window) {
  speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); buildVoicePanel(); };
}

/* =========================================================
   음성 인식 (STT)
========================================================= */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizing = false, currentRec = null;
if (!SR) {
  setStatus("⚠️ 이 브라우저는 음성 인식을 지원하지 않아요 (안드로이드 크롬 권장)");
}

async function listen(fromLang, toLang, side, micBtn) {
  if (!SR) { setStatus("⚠️ 안드로이드 크롬에서 음성 인식이 가장 잘 돼요."); return; }
  if (recognizing) { try { currentRec && currentRec.stop(); } catch (_) {} return; } // 다시 누르면 바로 끝내기
  speechSynthesis.cancel();
  micBtn.classList.add("listening");
  const text = await recognizeUntilSilence(fromLang);   // 멈추면 3초 뒤 종료
  micBtn.classList.remove("listening");
  if (!text) { setStatus("🔇 말소리가 안 들렸어요. 다시 눌러보세요."); return; }
  setStatus(t("translating", L[toLang].name));
  try {
    const translated = await translate(text, fromLang, toLang);
    addBubble(side, fromLang, text, translated, toLang);
    speak(translated, toLang);
    setStatus(t("transferred", L[toLang].name));
  } catch (err) {
    setStatus(/USED ALL AVAILABLE/i.test(err.message)
      ? "⚠️ 오늘 무료 번역 사용량을 다 썼어요. 내일 다시 되거나, 자체 번역서버로 바꿀 수 있어요."
      : "⚠️ 번역 실패 — 인터넷 연결을 확인하세요.");
  }
}

/* =========================================================
   🎧 자동(핸즈프리) 통역 모드
   한 번 켜두면 번갈아 말할 때마다 자동으로 인식→번역→읽기
========================================================= */
const autoBtn = document.getElementById("autoBtn");
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
let autoMode = false, turnLang = null;
if (!SR) autoBtn.disabled = true;

function highlightTurn(lang) {
  const mine = lang === myLangEl.value;
  micMe.classList.toggle("listening", mine);
  micThem.classList.toggle("listening", !mine);
}

// 침묵 감지: 말하는 동안 계속 듣고, 멈춘 뒤 SILENCE_MS 지나면 종료 → 그때 번역
const SILENCE_MS = 3000; // 말을 멈추고 이만큼(3초) 지나면 번역 시작
function recognizeUntilSilence(lang) {
  return new Promise((resolve) => {
    if (!SR) { resolve(null); return; }
    const rec = new SR(); currentRec = rec;
    rec.lang = L[lang].stt; rec.interimResults = true; rec.continuous = true; rec.maxAlternatives = 1;
    let finalText = "", silenceTimer = null;
    const arm = () => { clearTimeout(silenceTimer); silenceTimer = setTimeout(() => { try { rec.stop(); } catch (_) {} }, SILENCE_MS); };
    rec.onstart = () => { recognizing = true; setStatus(t("listening", L[lang].flag + " " + L[lang].name)); };
    rec.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += t + " "; else interim += t;
      }
      setStatus("📝 " + (finalText + interim).trim());
      arm(); // 말할 때마다 타이머 리셋 → 계속 말하면 계속 들음
    };
    rec.onerror = (e) => {
      if (e.error === "not-allowed") { setStatus("🎤 마이크 권한을 허용해 주세요."); autoStop(); }
      else if (e.error === "language-not-supported") setStatus("⚠️ 이 언어는 이 기기에서 음성 인식이 안 돼요.");
    };
    rec.onend = () => { clearTimeout(silenceTimer); recognizing = false; resolve(finalText.trim()); };
    try { rec.start(); } catch (_) { resolve(null); }
  });
}

// 번역문을 소리 내어 읽고, 다 읽으면 resolve (자동 루프용)
function speakThen(text, lang) {
  return new Promise((resolve) => speakRobust(text, lang, resolve));
}

async function autoLoop() {
  while (autoMode) {
    const from = turnLang;
    const to = (from === myLangEl.value) ? theirLangEl.value : myLangEl.value;
    highlightTurn(from);
    const text = await recognizeUntilSilence(from);
    if (!autoMode) break;
    if (!text) { await sleep(200); continue; }         // 말소리 없으면 계속 대기
    setStatus(t("translating", L[to].name));
    let translated;
    try { translated = await translate(text, from, to); }
    catch (e) {
      setStatus(/USED ALL AVAILABLE/i.test(e.message)
        ? "⚠️ 오늘 무료 번역 사용량을 다 썼어요."
        : "⚠️ 번역 실패 — 인터넷 확인");
      await sleep(600); continue;
    }
    addBubble((from === myLangEl.value) ? "me" : "them", from, text, translated, to);
    await speakThen(translated, to);
    if (!autoMode) break;
    await sleep(250);          // 방금 읽은 소리를 다시 듣지 않도록 잠깐 쉼
    turnLang = to;             // 이제 상대가 대답할 차례
  }
}

// 마이크 권한 명시적으로 요청 (분명한 팝업 + 차단 시 안내)
async function ensureMic() {
  try {
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      s.getTracks().forEach((t) => t.stop()); // 권한만 확인하고 바로 해제
    }
    return true;
  } catch (e) { return false; }
}

async function autoStart() {
  if (!SR) { setStatus("⚠️ 안드로이드 크롬에서 음성 인식이 가장 잘 돼요."); return; }
  if (callActive) { setStatus("📞 통역 통화 중에는 자동 모드를 쓸 수 없어요."); return; }
  setStatus("🎤 마이크 권한을 확인하는 중… 팝업이 뜨면 ‘허용’을 눌러주세요");
  const ok = await ensureMic();
  if (!ok) {
    setStatus("🎤 마이크가 꺼져 있어요. 주소창 🔒(자물쇠) → 권한 → 마이크 → 허용 후 다시 시작하세요.");
    return;
  }
  autoMode = true; turnLang = myLangEl.value;
  autoBtn.textContent = t("auto_stop");
  autoBtn.classList.add("on");
  emptyEl.style.display = "none";
  autoLoop();
}
function autoStop() {
  autoMode = false;
  autoBtn.textContent = t("auto_start");
  autoBtn.classList.remove("on");
  try { currentRec && currentRec.stop(); } catch (_) {}
  try { speechSynthesis.cancel(); } catch (_) {}
  clearInterval(ttsTimer);
  micMe.classList.remove("listening"); micThem.classList.remove("listening");
  setStatus("정지됨 · 버튼을 누르면 다시 시작해요");
}
autoBtn.onclick = () => (autoMode ? autoStop() : autoStart());

// 차례 강제 지정(자동 모드) / 한 번만 말하기(수동 모드)
function setTurn(lang) { turnLang = lang; try { currentRec && currentRec.stop(); } catch (_) {} }
micMe.onclick   = () => (autoMode ? setTurn(myLangEl.value)    : listen(myLangEl.value, theirLangEl.value, "me", micMe));
micThem.onclick = () => (autoMode ? setTurn(theirLangEl.value) : listen(theirLangEl.value, myLangEl.value, "them", micThem));

/* =========================================================
   📞 앱 안 통역 통화 (WebRTC / PeerJS) — 상대도 이 앱 필요
   내가 말함 → 내 언어로 인식 → 상대 언어로 번역 → 전송
   → 상대 폰이 상대 언어로 읽어줌 (반대도 동일)
========================================================= */
let peer = null, conn = null, peerLang = null, callActive = false, speaking = false, peerLibLoading = null;
const gid = (id) => document.getElementById(id);
function setCallStatus(m) { gid("callStatus").textContent = m || ""; }

function loadPeerJS() {
  if (window.Peer) return Promise.resolve();
  if (peerLibLoading) return peerLibLoading;
  peerLibLoading = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js";
    s.onload = resolve; s.onerror = () => reject(new Error("load fail"));
    document.head.appendChild(s);
  });
  return peerLibLoading;
}
const PEER_OPTS = { config: { iceServers: [
  { urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"] },
  { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
  { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" },
  { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" }
] } };
function randomCode() {
  const c = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let s = "";
  for (let i = 0; i < 5; i++) s += c[Math.floor(Math.random() * c.length)];
  return s;
}

gid("callToggle").onclick = () => gid("callPanel").classList.toggle("open");
gid("hostBtn").onclick = hostRoom;
gid("joinBtn").onclick = () => { gid("joinArea").style.display = "block"; gid("hostArea").style.display = "none"; setCallStatus(""); };
gid("connectBtn").onclick = () => { const v = gid("codeInput").value.trim().toUpperCase(); if (v) joinRoom(v); };
gid("copyCode").onclick = () => { try { navigator.clipboard.writeText(gid("roomCode").textContent); setCallStatus("코드를 복사했어요!"); } catch (_) {} };
gid("hangBtn").onclick = () => endCall(true);
gid("callBtn").onclick = () => (callActive ? stopCall() : startCall());
gid("chatSend").onclick = sendChat;
gid("chatInput").addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); sendChat(); } });

async function hostRoom() {
  if (autoMode) autoStop();
  setCallStatus("연결 준비 중…");
  try { await loadPeerJS(); } catch (e) { setCallStatus("⚠️ 통화 기능을 못 불러왔어요 (인터넷 확인)"); return; }
  const code = randomCode();
  peer = new Peer("sgpro-" + code, PEER_OPTS);
  peer.on("open", () => {
    gid("roomCode").textContent = code;
    gid("hostArea").style.display = "block"; gid("joinArea").style.display = "none";
    setCallStatus("상대가 참여하길 기다리는 중…");
  });
  peer.on("connection", (c) => { conn = c; setupConn(); });
  peer.on("error", onPeerError);
}
async function joinRoom(code) {
  if (autoMode) autoStop();
  setCallStatus("연결 중…");
  try { await loadPeerJS(); } catch (e) { setCallStatus("⚠️ 통화 기능을 못 불러왔어요 (인터넷 확인)"); return; }
  peer = new Peer(PEER_OPTS);
  peer.on("open", () => { conn = peer.connect("sgpro-" + code, { reliable: true }); setupConn(); });
  peer.on("error", onPeerError);
}
function onPeerError(e) {
  const t = (e && e.type) || "";
  if (t === "peer-unavailable") setCallStatus("⚠️ 그 코드의 방이 없어요. 코드를 다시 확인하세요.");
  else if (t === "unavailable-id") setCallStatus("코드가 겹쳤어요 — '방 만들기'를 한 번 더 눌러주세요.");
  else setCallStatus("⚠️ 연결 문제: " + t + " — 네트워크를 확인하세요.");
}
function setupConn() {
  let opened = false;
  const failTimer = setTimeout(() => {
    if (!opened) setCallStatus("⚠️ 연결이 안 돼요. 두 폰을 같은 와이파이에 두고 다시 시도해 보세요. (서로 다른 통신망이면 무료 연결이 어려울 수 있어요)");
  }, 22000);
  conn.on("open", () => {
    opened = true; clearTimeout(failTimer);
    conn.send({ type: "hello", lang: myLangEl.value });
    gid("callSetup").style.display = "none"; gid("callLive").style.display = "block";
    gid("chatBar").classList.add("show");   // 연결되면 채팅 입력줄 표시
    gid("chatLangBar").classList.add("show");
    setCallStatus("");
    try {
      const pc = conn.peerConnection;
      if (pc) pc.oniceconnectionstatechange = () => {
        if (pc.iceConnectionState === "failed") setCallStatus("⚠️ 네트워크 연결이 끊겼어요. 다시 연결해 주세요.");
      };
    } catch (_) {}
  });
  conn.on("data", onCallData);
  conn.on("close", () => { setCallStatus("상대가 연결을 끊었어요."); endCall(false); });
  conn.on("error", (e) => { setCallStatus("연결 오류: " + ((e && e.type) || e)); });
}
async function onCallData(msg) {
  if (!msg) return;
  if (msg.type === "hello") {
    peerLang = msg.lang;
    gid("peerLangLabel").textContent = L[peerLang] ? (L[peerLang].flag + " " + L[peerLang].name) : msg.lang;
    return;
  }
  if (msg.type === "chat") {   // 상대가 보낸 채팅 (이미 내 언어로 번역돼 옴) — 자동 낭독은 안 함
    addBubble("them", msg.from, msg.orig, msg.tr, myLangEl.value);
    return;
  }
  if (msg.type === "speech") {
    speaking = true;
    try { currentRec && currentRec.stop(); } catch (_) {}
    addBubble("them", msg.from, msg.orig, msg.tr, myLangEl.value);
    await speakThen(msg.tr, myLangEl.value);   // 이미 내 언어로 번역돼서 옴
    speaking = false;
  }
}

// 채팅 보내기: 내 언어로 입력 → 상대 언어로 번역해서 전송
async function sendChat() {
  const inp = gid("chatInput");
  const text = inp.value.trim();
  if (!text || !conn || !conn.open) return;
  inp.value = "";
  let tr = text;
  try { if (peerLang) tr = await translate(text, myLangEl.value, peerLang); } catch (_) {}
  conn.send({ type: "chat", orig: text, tr: tr, from: myLangEl.value });
  addBubble("me", myLangEl.value, text, tr, peerLang || myLangEl.value);
}
async function callLoop() {
  while (callActive) {
    if (speaking) { await sleep(150); continue; }         // 상대 말 재생 중엔 안 들음
    const text = await recognizeUntilSilence(myLangEl.value);
    if (!callActive) break;
    if (speaking || !text) { await sleep(80); continue; }
    let tr = text;
    try { if (peerLang) tr = await translate(text, myLangEl.value, peerLang); } catch (_) {}
    if (conn && conn.open) conn.send({ type: "speech", orig: text, tr: tr, from: myLangEl.value });
    addBubble("me", myLangEl.value, text, tr, peerLang || myLangEl.value);
  }
}
async function startCall() {
  if (!conn || !conn.open) { setCallStatus("아직 연결되지 않았어요."); return; }
  const ok = await ensureMic();
  if (!ok) { setStatus("🎤 마이크 권한을 허용해 주세요."); return; }
  callActive = true;
  gid("callBtn").textContent = t("call_stop"); gid("callBtn").classList.add("on");
  if (autoBtn) autoBtn.disabled = true;
  callLoop();
}
function stopCall() {
  callActive = false;
  gid("callBtn").textContent = t("call_start"); gid("callBtn").classList.remove("on");
  try { currentRec && currentRec.stop(); } catch (_) {}
  try { speechSynthesis.cancel(); } catch (_) {}
  if (autoBtn) autoBtn.disabled = !SR;
}
function endCall(sendClose) {
  stopCall();
  try { if (sendClose && conn) conn.close(); } catch (_) {}
  try { if (peer) peer.destroy(); } catch (_) {}
  peer = null; conn = null; peerLang = null;
  gid("callLive").style.display = "none"; gid("callSetup").style.display = "block";
  gid("hostArea").style.display = "none"; gid("joinArea").style.display = "none";
  gid("chatBar").classList.remove("show");
  gid("chatLangBar").classList.remove("show");
}

/* =========================================================
   PWA: 폰에 설치(저장) 지원
========================================================= */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
let deferredPrompt = null;
const installBanner = document.getElementById("install");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.style.display = "block";
});
document.getElementById("installBtn").onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.style.display = "none";
};
window.addEventListener("appinstalled", () => { installBanner.style.display = "none"; });

/* =========================================================
   첫 설정: 처음 켜면 언어 선택, 이후엔 저장된 언어로
========================================================= */
(function initI18n() {
  let savedUi = null, savedMy = null;
  try { savedUi = localStorage.getItem("uiLang"); savedMy = localStorage.getItem("myLang"); } catch (_) {}
  if (savedMy && L[savedMy]) myLangEl.value = savedMy;
  applyI18n(savedUi && I18N[savedUi] ? savedUi : "ko");

  const ob = document.getElementById("onboarding");
  if (savedUi && I18N[savedUi]) {
    ob.style.display = "none";
  } else {
    ob.style.display = "flex";
    ob.querySelectorAll("[data-uilang]").forEach(btn => {
      btn.onclick = () => {
        const ui = btn.getAttribute("data-uilang");
        const my = btn.getAttribute("data-my");
        try { localStorage.setItem("uiLang", ui); localStorage.setItem("myLang", my); } catch (_) {}
        if (L[my]) myLangEl.value = my;
        applyI18n(ui);
        setStatus(t("ready"));
        ob.style.display = "none";
      };
    });
  }
})();
</script>
